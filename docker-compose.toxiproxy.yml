version: '3.8'

services:
  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.9.0
    ports:
      - "8474:8474"  # Admin API
      - "8081:8081"  # Proxied backend (instead of 8080)
    networks:
      - loppis
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8474/version"]
      interval: 5s
      timeout: 3s
      retries: 3

networks:
  loppis:
    external: true
    name: iloppis_default
